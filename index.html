<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600&display=swap%22 rel="stylesheet">
<style>

  :root {

    --ink: #11151c;

    --ink-soft: #1c222c;

    --parchment: #ece6d8;

    --brass: #c99a4b;

    --brass-dim: #8a6c38;

    --line: rgba(236, 230, 216, 0.12);

  }
 
  * { box-sizing: border-box; }
 
  body {

    margin: 0;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    background: radial-gradient(circle at 50% 0%, var(--ink-soft), var(--ink) 70%);

    font-family: 'Manrope', sans-serif;

    color: var(--parchment);

    padding: 24px;

  }
 
  .card {

    width: 100%;

    max-width: 380px;

    background: var(--ink-soft);

    border: 1px solid var(--line);

    border-radius: 14px;

    padding: 40px 36px 32px;

    box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);

  }
 
  .keyhole {

    width: 34px;

    height: 34px;

    margin: 0 auto 22px;

    display: block;

  }
 
  h1 {

    font-family: 'Fraunces', serif;

    font-weight: 600;

    font-size: 26px;

    text-align: center;

    margin: 0 0 6px;

    letter-spacing: 0.2px;

  }
 
  .sub {

    text-align: center;

    font-size: 13.5px;

    color: rgba(236, 230, 216, 0.55);

    margin: 0 0 28px;

  }
 
  label {

    display: block;

    font-size: 12px;

    text-transform: uppercase;

    letter-spacing: 0.08em;

    color: rgba(236, 230, 216, 0.5);

    margin-bottom: 6px;

  }
 
  .field { margin-bottom: 18px; }
 
  input {

    width: 100%;

    padding: 11px 13px;

    background: rgba(0, 0, 0, 0.25);

    border: 1px solid var(--line);

    border-radius: 8px;

    color: var(--parchment);

    font-family: 'Manrope', sans-serif;

    font-size: 14.5px;

    outline: none;

    transition: border-color 0.15s ease;

  }
 
  input:focus {

    border-color: var(--brass);

    box-shadow: 0 0 0 3px rgba(201, 154, 75, 0.18);

  }
 
  .row {

    display: flex;

    justify-content: space-between;

    align-items: center;

    font-size: 13px;

    margin: 4px 0 24px;

  }
 
  .row a {

    color: var(--brass);

    text-decoration: none;

  }
 
  .row a:focus-visible, button:focus-visible {

    outline: 2px solid var(--brass);

    outline-offset: 2px;

  }
 
  .remember {

    display: flex;

    align-items: center;

    gap: 6px;

    color: rgba(236, 230, 216, 0.6);

  }
 
  button {

    width: 100%;

    padding: 12px;

    background: linear-gradient(180deg, var(--brass), var(--brass-dim));

    border: none;

    border-radius: 8px;

    color: #1a1206;

    font-weight: 600;

    font-size: 14.5px;

    cursor: pointer;

  }
 
  button:hover { filter: brightness(1.06); }
 
  .footer {

    text-align: center;

    font-size: 13px;

    margin-top: 22px;

    color: rgba(236, 230, 216, 0.5);

  }
 
  .footer a { color: var(--parchment); text-decoration: underline; }
</style>
</head>
<body>
<main class="card">
<svg class="keyhole" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="12" cy="9" r="4.5" stroke="#c99a4b" stroke-width="1.4"/>
<path d="M12 13.5L9 21H15L12 13.5Z" stroke="#c99a4b" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
<h1>Welcome back</h1>
<p class="sub">Sign in to your account</p>
 
    <form>
<div class="field">
<label for="email">Email</label>
<input id="email" type="email" placeholder="you@example.com" autocomplete="email">
</div>
<div class="field">
<label for="password">Password</label>
<input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
</div>
 
      <div class="row">
<span class="remember">
<input type="checkbox" id="remember" style="width:auto;">
<label for="remember" style="margin:0; text-transform:none; font-size:13px; color:inherit;">Remember me</label>
</span>
<a href="#">Forgot password?</a>
</div>
 
      <button type="submit">Sign in</button>
</form>
 
    <p class="footer">Don't have an account? <a href="#">Sign up</a></p>
</main>
</body>
</html>
